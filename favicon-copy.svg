<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0f0f1a"/>
  <!-- Clipboard body -->
  <rect x="7" y="8" width="18" height="20" rx="2" fill="none" stroke="#34d399" stroke-width="2"/>
  <!-- Clipboard top clip -->
  <rect x="11" y="5" width="10" height="6" rx="2" fill="#0f0f1a" stroke="#34d399" stroke-width="2"/>
  <!-- Lines on clipboard -->
  <line x1="11" y1="16" x2="21" y2="16" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="20" x2="21" y2="20" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="24" x2="17" y2="24" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
</svg>
